name: Install database edition

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: install-database-edition
  cancel-in-progress: true

jobs:
  install:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          repository: 1450341742-ops/TrialAudit-Hub
          ref: codex/build-trialaudit-hub-mvp
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rebuild and install application source
        shell: bash
        run: |
          set -euxo pipefail
          if [ ! -f bundle.part08 ]; then
            echo "Bundle parts are not complete yet."
            exit 0
          fi
          cat bundle.part* | base64 --decode > bundle.zip
          python -m zipfile -t bundle.zip
          python -m zipfile -e bundle.zip .
          test -f supabase/schema.sql
          test -f streamlit_app.py
          rm -f bundle.zip bundle.part* install.log install-exit-code.txt .install-trigger .github/workflows/unpack.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install Supabase database edition"
          git push --force origin HEAD:codex/build-trialaudit-hub-mvp
