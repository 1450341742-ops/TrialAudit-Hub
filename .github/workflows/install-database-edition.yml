name: Install database edition

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: install-database-edition
  cancel-in-progress: true

jobs:
  install:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          repository: 1450341742-ops/TrialAudit-Hub
          ref: codex/build-trialaudit-hub-mvp
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install application source
        shell: bash
        run: |
          set -euxo pipefail
          test -f bundle.zip
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile
          with ZipFile('bundle.zip') as archive:
              archive.testzip()
              archive.extractall('.')
          assert Path('supabase/schema.sql').exists()
          assert Path('pages/6_数据导入.py').exists()
          PY
          rm -f bundle.zip .install-trigger .github/workflows/unpack.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install Supabase database edition"
          git push --force-with-lease origin HEAD:codex/build-trialaudit-hub-mvp
