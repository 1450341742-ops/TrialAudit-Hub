name: Install database edition

on:
  push:
    branches:
      - codex/build-trialaudit-hub-mvp
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  install:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          repository: 1450341742-ops/TrialAudit-Hub
          ref: codex/build-trialaudit-hub-mvp
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Unpack application source
        shell: bash
        run: |
          test -f bundle.zip || { echo "bundle.zip not found; nothing to install"; exit 0; }
          unzip -o bundle.zip
          rm -f bundle.zip .install-trigger .github/workflows/unpack.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install Supabase database edition"
          git push origin HEAD:codex/build-trialaudit-hub-mvp
