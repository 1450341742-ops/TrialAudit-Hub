name: Install TrialAudit Hub database edition

on:
  push:
    branches:
      - codex/build-trialaudit-hub-mvp

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Unpack application bundle
        shell: bash
        run: |
          if [ ! -f bundle.zip ]; then
            echo "Bundle already installed."
            exit 0
          fi
          unzip -o bundle.zip
          rm bundle.zip
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install Supabase database edition"
          git push
